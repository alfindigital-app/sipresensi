<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>SI Presensi</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" sizes="192x192" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhUBCK8u-n_wcuL2SFiLkWmfcKu7399U2Ise6yj0o09QVUaphSD9LzjXNJvhzeuEHleH6dTAjMnOQu6SqCvm7GNGDhQ-ZzwBK1vPf_HOxIcQlemPJpyAVl_DEt4u3ObQkTFGk1pJA4O6SZuz2d-AwxlRhS9hyXTZbGintC4_WzbU0_7JCdzEtl5nVkSwjA/s400/Gemini_Generated_Image_tfua15tfua15tfua%20%281%29.png">
  <link rel="apple-touch-icon" sizes="192x192" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhUBCK8u-n_wcuL2SFiLkWmfcKu7399U2Ise6yj0o09QVUaphSD9LzjXNJvhzeuEHleH6dTAjMnOQu6SqCvm7GNGDhQ-ZzwBK1vPf_HOxIcQlemPJpyAVl_DEt4u3ObQkTFGk1pJA4O6SZuz2d-AwxlRhS9hyXTZbGintC4_WzbU0_7JCdzEtl5nVkSwjA/s400/Gemini_Generated_Image_tfua15tfua15tfua%20%281%29.png">
  <meta name="theme-color" content="#4CAF50">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f4f6f8; font-family: sans-serif; }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }

    /* Banner Instalasi dari Atas */
    #banner-install-irfin {
      display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 400px; background: #ffffff; padding: 12px 10px 12px 12px;
      border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); z-index: 9999; 
      border: 1px solid #e0e0e0; animation: slideDown 0.5s ease-out;
    }
    @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
    .flex-banner { display: flex; align-items: center; gap: 10px; }
    .icon-app-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
    .text-banner { flex-grow: 1; }
    .text-banner h4 { margin: 0; font-size: 14px; color: #333; font-weight: bold;}
    .text-banner p { margin: 0; font-size: 11px; color: #666; }
    .btn-install { background: #4CAF50; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
    .btn-close-x { background: none; border: none; font-size: 18px; color: #999; cursor: pointer; padding: 0 5px; margin-left: 2px; }
    @media (display-mode: standalone) { #banner-install-irfin { display: none !important; } }

    /* CSS UNTUK OVERLAY KAMERA DI GITHUB */
    #kamera-eksternal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 99999; flex-direction: column;
    }
    #kamera-header {
      position: absolute; top: 0; width: 100%; padding: 15px; z-index: 10;
      display: flex; justify-content: flex-start;
    }
    #kamera-header button {
      background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px;
      border-radius: 20px; font-weight: bold; cursor: pointer;
    }
    #kamera-area {
      flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    #video-kamera {
      width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* Efek Kaca */
    }
    #kamera-footer {
      position: absolute; bottom: 0; width: 100%; padding-bottom: 40px;
      display: flex; justify-content: center; z-index: 10;
    }
    #btn-jepret {
      width: 70px; height: 70px; border-radius: 50%; border: 4px solid white;
      background: rgba(255,255,255,0.3); cursor: pointer;
    }
  </style>
</head>
<body>

  <iframe allow="geolocation; camera; microphone" allowfullscreen="true" src="https://script.google.com/macros/s/AKfycby-5EOgCKyRhvj_OshrJC2RjfYMDa_nVNpy24EGKx4YGXyuViv3-OSvlFsJUm_P5o5m/exec"></iframe>

  <div id="banner-install-irfin">
    <div class="flex-banner">
      <img class="icon-app-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhUBCK8u-n_wcuL2SFiLkWmfcKu7399U2Ise6yj0o09QVUaphSD9LzjXNJvhzeuEHleH6dTAjMnOQu6SqCvm7GNGDhQ-ZzwBK1vPf_HOxIcQlemPJpyAVl_DEt4u3ObQkTFGk1pJA4O6SZuz2d-AwxlRhS9hyXTZbGintC4_WzbU0_7JCdzEtl5nVkSwjA/s400/Gemini_Generated_Image_tfua15tfua15tfua%20%281%29.png"/>
      <div class="text-banner">
        <h4>Instal SI Presensi</h4>
        <p>Akses lebih cepat & stabil</p>
      </div>
      <button class="btn-install" id="btnInstallIrfin">INSTAL</button>
      <button class="btn-close-x" id="btnCloseIrfin">&times;</button>
    </div>
  </div>

  <div id="kamera-eksternal">
    <div id="kamera-header">
      <button onclick="tutupKameraGitHub()">&#8592; Batal</button>
    </div>
    <div id="kamera-area">
      <video id="video-kamera" autoplay playsinline></video>
    </div>
    <div id="kamera-footer">
      <button id="btn-jepret" onclick="jepretGitHub()"></button>
    </div>
    <canvas id="canvas-kamera" style="display:none;"></canvas>
  </div>

  <script>
    // 1. Daftarkan Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        console.log("Service Worker Terdaftar!");
      });
    }

    // 2. Logika Banner Otomatis
    let deferredPrompt = null; 
    const banner = document.getElementById('banner-install-irfin');
    const btnInstall = document.getElementById('btnInstallIrfin');
    const btnClose = document.getElementById('btnCloseIrfin');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    btnInstall.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          banner.style.display = 'none';
          sessionStorage.setItem('sudahTutupBanner', 'true');
        }
        deferredPrompt = null;
      }
    });

    btnClose.addEventListener('click', () => {
      banner.style.display = 'none';
      sessionStorage.setItem('sudahTutupBanner', 'true');
    });

    window.addEventListener('appinstalled', () => {
      banner.style.display = 'none';
    });

    // ========================================================
    // 3. LOGIKA KOMUNIKASI DENGAN GAS & KAMERA EKSTERNAL
    // ========================================================
    let streamVideo = null;
    const frameKamera = document.getElementById('kamera-eksternal');
    const videoEl = document.getElementById('video-kamera');
    
    // MENDENGARKAN PERINTAH DARI GAS
    window.addEventListener('message', (event) => {
      // Perintah 1: Tampilkan Banner Install
      if (event.data === "login_sukses") {
        setTimeout(() => {
          if (deferredPrompt && !sessionStorage.getItem('sudahTutupBanner')) {
            banner.style.display = 'block';
          }
        }, 3000);
      }

      // Perintah 2: BUKA KAMERA!
      if (event.data === "PERINTAH_BUKA_KAMERA") {
        bukaKameraGitHub();
      }
    });

    // Fungsi Nyalakan Kamera
    function bukaKameraGitHub() {
      frameKamera.style.display = 'flex';
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(stream => {
          streamVideo = stream;
          videoEl.srcObject = stream;
        })
        .catch(err => {
          alert("Akses kamera ditolak oleh browser: " + err.message);
          tutupKameraGitHub();
        });
    }

    // Fungsi Matikan Kamera
    function tutupKameraGitHub() {
      if (streamVideo) {
        streamVideo.getTracks().forEach(track => track.stop());
        streamVideo = null;
      }
      frameKamera.style.display = 'none';
    }

    // Fungsi Jepret & Lempar Data
    function jepretGitHub() {
      try {
        const canvasEl = document.getElementById('canvas-kamera');
        const ctx = canvasEl.getContext('2d');
        const videoElemen = document.getElementById('video-kamera');
        
        canvasEl.width = videoElemen.videoWidth;
        canvasEl.height = videoElemen.videoHeight;
        
        ctx.translate(canvasEl.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(videoElemen, 0, 0, canvasEl.width, canvasEl.height);
        
        const fotoTeks = canvasEl.toDataURL('image/jpeg', 0.8);
        tutupKameraGitHub();
        
        // Lempar foto ke Iframe GAS
        const iframeTarget = document.querySelector('iframe');
        iframeTarget.contentWindow.postMessage({ aksi: "HASIL_FOTO_GITHUB", data: fotoTeks }, "*");
        
      } catch (error) {
        alert("Gagal memproses foto di GitHub: " + error.message);
      }
    }
  </script>
</body>
</html>
